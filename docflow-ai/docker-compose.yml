version: "3.9"

services:
  # ─────────────────────────────────────────────
  # FastAPI — DocFlow AI Backend
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: docflow-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Ollama — Local LLM Runtime
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: docflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Qdrant — Local Vector Store (semantic search)
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docflow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # n8n — Workflow Automation
  # ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: docflow-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=docflow123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/.n8n/workflows
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  n8n_data:
